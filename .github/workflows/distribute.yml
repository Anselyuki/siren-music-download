name: Distribute desktop builds

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional tag name for publishing a GitHub Release, for example v0.1.0
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-distribute:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            artifact_glob: target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            artifact_glob: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
            artifact_glob: target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build workflow artifacts
        if: github.ref_type != 'tag' && !(github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npx tauri
          args: ${{ matrix.args }}
          includeDebug: false
          includeUpdaterJson: false

      - name: Upload workflow artifacts
        if: github.ref_type != 'tag' && !(github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}-installer
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          compression-level: 0

      - name: Build and upload release assets
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npx tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.release_tag }}
          releaseCommitish: ${{ github.sha }}
          releaseName: Siren Music Download ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.release_tag }}
          releaseBody: Automated desktop build artifacts for macOS and Windows.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_type == 'tag' && github.ref_name || github.event.inputs.release_tag, '-') }}
          generateReleaseNotes: true
          includeDebug: false
          includeUpdaterJson: false
          assetNamePattern: '[name]_[version]_[platform]_[arch][ext]'
